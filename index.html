<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f8f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a18;
    }
    .card {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0dfd8;
      border-top-color: #444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
    p  { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
    a  { font-size: 13px; color: #444; }
    .error { color: #c0392b; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="heading">Redirecting you…</h1>
    <p id="subtext">Just a moment</p>
    <p class="error" id="error"></p>
    <a href="#" id="manualLink" style="display:none">Click here if you are not redirected</a>
  </div>

  <script>
    fetch('./config.json?nocache=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('config.json not found');
        return r.json();
      })
      .then(cfg => {
        if (!cfg.destination) throw new Error('No destination set in config.json');
        const url = cfg.destination;
        document.getElementById('subtext').textContent = url;
        document.getElementById('manualLink').href = url;
        document.getElementById('manualLink').style.display = 'inline';
        setTimeout(() => { window.location.replace(url); }, 800);
      })
      .catch(err => {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('heading').textContent = 'Redirect failed';
        const e = document.getElementById('error');
        e.style.display = 'block';
        e.textContent = err.message;
      });
  </script>
</body>
</html>
